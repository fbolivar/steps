<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{background:#06090F;color:#EEF2FF;font-family:'DM Sans',sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:'Playfair Display',serif}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#06090F}
::-webkit-scrollbar-thumb{background:#E8A020;border-radius:2px}

/* ─── Scroll bar ─── */
#sp{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,#E8A020,#1B4F8A);z-index:9999;width:0;transition:width .08s}

/* ─── Cursor glow ─── */
#cg{position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(232,160,32,.07) 0%,transparent 65%);pointer-events:none;z-index:0;transform:translate(-50%,-50%);transition:left .4s ease,top .4s ease}

/* ─── Noise overlay ─── */
.noise::after{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");opacity:.032;pointer-events:none;z-index:1}

/* ─── Glass ─── */
.glass{background:rgba(255,255,255,.045);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08)}

/* ─── Gradient text ─── */
.gt{background:linear-gradient(135deg,#E8A020,#F5D76E 50%,#E8A020);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.gt-blue{background:linear-gradient(135deg,#4A90D9,#7BB5F0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* ─── Tag pill ─── */
.tag{display:inline-flex;align-items:center;gap:7px;background:rgba(232,160,32,.1);border:1px solid rgba(232,160,32,.25);padding:5px 16px;border-radius:100px;font-size:10.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#E8A020;font-family:'DM Sans',sans-serif}
.tag-dot{width:6px;height:6px;border-radius:50%;background:#E8A020;display:inline-block;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ─── Buttons ─── */
.btn-gold{position:relative;overflow:hidden;background:linear-gradient(135deg,#E8A020,#C87010);color:#fff;font-family:'DM Sans',sans-serif;font-weight:700;font-size:14px;padding:14px 32px;border:none;cursor:pointer;transition:transform .3s,box-shadow .3s;display:inline-flex;align-items:center;gap:8px}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 16px 48px rgba(232,160,32,.35)}
.btn-gold::after{content:'';position:absolute;top:0;left:0;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent);transform:translateX(-200%);animation:sh 2.8s ease infinite}
@keyframes sh{0%{transform:translateX(-200%)}55%,100%{transform:translateX(350%)}}
.btn-outline{background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.8);font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;padding:14px 32px;cursor:pointer;transition:all .3s;display:inline-flex;align-items:center;gap:8px}
.btn-outline:hover{border-color:rgba(232,160,32,.5);color:#E8A020;transform:translateY(-2px)}

/* ─── Section label ─── */
.sec-label{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#E8A020;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.sec-label::before{content:'';width:32px;height:1px;background:#E8A020}

/* ─── Card hover ─── */
.ch{transition:transform .38s cubic-bezier(.25,.46,.45,.94),box-shadow .38s ease,border-color .3s}
.ch:hover{transform:translateY(-8px);box-shadow:0 32px 64px rgba(0,0,0,.5),0 0 0 1px rgba(232,160,32,.15)}

/* ─── Marquee ─── */
@keyframes mql{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes mqr{from{transform:translateX(-50%)}to{transform:translateX(0)}}
.mql{animation:mql 40s linear infinite;display:flex;width:max-content;gap:16px}
.mqr{animation:mqr 40s linear infinite;display:flex;width:max-content;gap:16px}
.mq-wrap:hover .mql,.mq-wrap:hover .mqr{animation-play-state:paused}

/* ─── Reveal ─── */
@keyframes ru{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
.fu{opacity:0}.fu.vis{animation:ru .7s cubic-bezier(.22,1,.36,1) forwards}
.fu.vis.d1{animation-delay:.08s}.fu.vis.d2{animation-delay:.18s}.fu.vis.d3{animation-delay:.28s}.fu.vis.d4{animation-delay:.38s}.fu.vis.d5{animation-delay:.48s}

/* ─── Hero text anim ─── */
@keyframes hru{from{opacity:0;transform:translateY(50px) skewY(2deg)}to{opacity:1;transform:translateY(0) skewY(0)}}
.hrv{animation:hru .9s cubic-bezier(.22,1,.36,1) both;opacity:0}
.hrv.d1{animation-delay:.1s}.hrv.d2{animation-delay:.28s}.hrv.d3{animation-delay:.46s}.hrv.d4{animation-delay:.64s}.hrv.d5{animation-delay:.82s}

/* ─── Orb ─── */
@keyframes od{0%,100%{transform:translate(0,0) scale(1)}40%{transform:translate(30px,-20px) scale(1.05)}70%{transform:translate(-20px,15px) scale(.96)}}
.orb{position:absolute;border-radius:50%;pointer-events:none;animation:od ease-in-out infinite}

/* ─── Float ─── */
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}

/* ─── Border gradient trick ─── */
.bg-border{position:relative}
.bg-border::before{content:'';position:absolute;inset:0;padding:1px;background:linear-gradient(135deg,rgba(232,160,32,.35),rgba(27,79,138,.2));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;border-radius:inherit}

/* ─── Tab ─── */
.tab-btn{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;padding:10px 24px;border-radius:100px;cursor:pointer;transition:all .25s;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);background:transparent}
.tab-btn.active{background:rgba(232,160,32,.12);border-color:rgba(232,160,32,.4);color:#E8A020}
.tab-btn:hover:not(.active){border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.8)}

/* ─── Grid line bg ─── */
.grid-bg{background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:64px 64px}

/* ─── Nav ─── */
.nav-bg{-webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px);background:rgba(6,9,15,.8);border-bottom:1px solid rgba(255,255,255,.07)}

/* ─── Modal ─── */
.modal-bkg{-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}

/* ─── Prod card image overlay ─── */
.prod-img-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(6,9,15,.95) 0%,rgba(6,9,15,.4) 50%,transparent 100%);transition:opacity .3s}

/* ─── Glow accent ─── */
.gold-glow{box-shadow:0 0 60px rgba(232,160,32,.2),0 0 120px rgba(232,160,32,.07)}

/* ─── Divider diagonal ─── */
.diag-top{clip-path:polygon(0 6%,100% 0,100% 100%,0 100%)}
.diag-bot{clip-path:polygon(0 0,100% 0,100% 94%,0 100%)}

/* ─── Counter section ─── */
.count-line{position:relative}
.count-line::after{content:'';position:absolute;bottom:0;left:0;height:2px;width:0;background:#E8A020;transition:width .6s ease}
.count-line:hover::after{width:100%}
</style>
</head>

/* ── Observer ── */
function useFU(){
  useEffect(()=>{
    const els=document.querySelectorAll('.fu');
    const obs=new IntersectionObserver(en=>{en.forEach(e=>{if(e.isIntersecting)e.target.classList.add('vis')});},{threshold:.08});
    els.forEach(e=>obs.observe(e));
    return()=>obs.disconnect();
  });
}

/* ── Cursor + progress ── */
function Ambient(){
  useEffect(()=>{
    const cg=document.getElementById('cg');
    const sp=document.getElementById('sp');
    const move=e=>{if(cg){cg.style.left=e.clientX+'px';cg.style.top=e.clientY+'px';}};
    const scroll=()=>{if(sp){const s=window.scrollY,h=document.documentElement.scrollHeight-window.innerHeight;sp.style.width=(s/h*100)+'%';}};
    window.addEventListener('mousemove',move);
    window.addEventListener('scroll',scroll,{passive:true});
    return()=>{window.removeEventListener('mousemove',move);window.removeEventListener('scroll',scroll);};
  },[]);
  return null;
}

function Header({onCotiza}){
  const [sc,setSc]=useState(false);
  const [mo,setMo]=useState(false);
  useEffect(()=>{
    const fn=()=>setSc(window.scrollY>40);
    window.addEventListener('scroll',fn,{passive:true});
    return()=>window.removeEventListener('scroll',fn);
  },[]);
  return(
    <header style={{position:'fixed',top:0,left:0,right:0,zIndex:50,transition:'all .35s'}}
      className={sc?'nav-bg shadow-2xl':'bg-transparent'}>
      <div style={{maxWidth:1280,margin:'0 auto',padding:'0 24px',display:'flex',alignItems:'center',justifyContent:'space-between',height:sc?64:80,transition:'height .35s'}}>
        <a href="#inicio"><Logo size={.88}/></a>
        {/* Desktop nav */}
        <nav style={{display:'flex',alignItems:'center',gap:4}} className="hidden md:flex">
          {NAV.map(n=>(
            <a key={n.h} href={n.h} style={{padding:'8px 14px',fontSize:13,fontWeight:500,color:'rgba(255,255,255,.6)',fontFamily:"'DM Sans',sans-serif",transition:'color .2s',textDecoration:'none',borderRadius:8}}
              onMouseEnter={e=>e.target.style.color='#EEF2FF'} onMouseLeave={e=>e.target.style.color='rgba(255,255,255,.6)'}>
              {n.l}
            </a>
          ))}
        </nav>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <a href="tel:3016876767" className="hidden md:flex" style={{alignItems:'center',gap:6,color:'rgba(255,255,255,.5)',fontSize:12,fontFamily:"'DM Sans',sans-serif",textDecoration:'none',transition:'color .2s'}}
            onMouseEnter={e=>e.target.style.color='#E8A020'} onMouseLeave={e=>e.target.style.color='rgba(255,255,255,.5)'}>
            <I.phone/> 301 687 6767
          </a>
          <button onClick={onCotiza} className="btn-gold hidden md:flex" style={{padding:'10px 22px',fontSize:13}}>
            Cotiza ahora <I.arrup/>
          </button>
          <button onClick={()=>setMo(!mo)} style={{background:'none',border:'none',cursor:'pointer',color:'#EEF2FF',padding:8}} className="md:hidden">
            {mo?<I.x/>:<I.menu/>}
          </button>
        </div>
      </div>
      {mo&&(
        <div style={{background:'rgba(6,9,15,.97)',borderTop:'1px solid rgba(255,255,255,.06)',padding:'12px 24px 20px'}}>
          {NAV.map(n=>(
            <a key={n.h} href={n.h} onClick={()=>setMo(false)}
              style={{display:'block',padding:'12px 0',fontSize:15,color:'rgba(255,255,255,.7)',borderBottom:'1px solid rgba(255,255,255,.06)',fontFamily:"'DM Sans',sans-serif",textDecoration:'none'}}>
              {n.l}
            </a>
          ))}
          <button onClick={()=>{setMo(false);onCotiza();}} className="btn-gold" style={{marginTop:16,width:'100%',justifyContent:'center'}}>
            Cotiza ahora <I.arrup/>
          </button>
        </div>
      )}
    </header>
  );
}

function Hero({onCotiza}){
  const [mx,setMx]=useState(0);
  const [my,setMy]=useState(0);
  const ref=useRef(null);
  const onMm=useCallback(e=>{
    if(!ref.current)return;
    const r=ref.current.getBoundingClientRect();
    setMx((e.clientX-r.left-r.width/2)/r.width);
    setMy((e.clientY-r.top-r.height/2)/r.height);
  },[]);
  return(
    <section id="inicio" ref={ref} onMouseMove={onMm}
      className="noise grid-bg"
      style={{position:'relative',minHeight:'100vh',display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',overflow:'hidden',background:'radial-gradient(ellipse 80% 60% at 20% 40%,rgba(27,79,138,.35) 0%,transparent 55%),radial-gradient(ellipse 60% 50% at 80% 60%,rgba(232,160,32,.06) 0%,transparent 50%),#06090F'}}>

      <div className="orb" style={{width:500,height:500,right:'-8%',bottom:'5%',background:'radial-gradient(circle,rgba(232,160,32,.12) 0%,transparent 70%)',animationDuration:'20s',animationDirection:'reverse',transform:`translate(${-mx*25}px,${-my*18}px)`,transition:'transform .9s ease-out'}}/>
      <div className="orb" style={{width:300,height:300,left:'55%',top:'15%',background:'radial-gradient(circle,rgba(74,144,217,.15) 0%,transparent 70%)',animationDuration:'24s',transform:`translate(${mx*15}px,${my*12}px)`,transition:'transform 1.1s ease-out'}}/>

      {/* Decorative big text bg */}
      <div style={{position:'absolute',bottom:'-5%',left:'50%',transform:'translateX(-50%)',fontFamily:"'Playfair Display',serif",fontSize:'30vw',fontWeight:800,color:'rgba(255,255,255,.018)',lineHeight:1,whiteSpace:'nowrap',pointerEvents:'none',userSelect:'none',letterSpacing:'-.03em'}}>
        STEPS
      </div>

      {/* Accent vertical line */}
      <div style={{position:'absolute',left:0,top:'20%',bottom:'20%',width:2,background:'linear-gradient(to bottom,transparent,#E8A020,transparent)',opacity:.5}}/>

      {/* Content */}
      <div style={{position:'relative',zIndex:2,maxWidth:860,padding:'0 24px',textAlign:'center',paddingTop:100}}>
        <div className="hrv d1" style={{marginBottom:24}}>
          <span className="tag"><span className="tag-dot"/>Agencia autorizada · Colombia</span>
        </div>

        <h1 style={{fontFamily:"'Playfair Display',serif",fontWeight:800,lineHeight:1.02,letterSpacing:'-.02em',marginBottom:28}}>
          <span className="hrv d2" style={{display:'block',fontSize:'clamp(3.2rem,7.5vw,6.5rem)',color:'#EEF2FF'}}>Protege lo que</span>
          <span className="hrv d3" style={{display:'block',fontSize:'clamp(3.2rem,7.5vw,6.5rem)'}}>
            <span className="gt">más amas.</span>
          </span>
        </h1>

        <p className="hrv d4" style={{fontSize:'clamp(15px,1.8vw,18px)',color:'rgba(238,242,255,.55)',fontFamily:"'DM Sans',sans-serif",lineHeight:1.7,maxWidth:560,margin:'0 auto 36px'}}>

              <div className="gt" style={{fontFamily:"'Playfair Display',serif",fontSize:'1.6rem',fontWeight:800}}>{s.n}</div>

/* ════════════════════ STATS ════════════════════ */
function useCount(n,active){
  const [v,setV]=useState(0);
  useEffect(()=>{
    if(!active)return;
    let s=null;
    const step=ts=>{
      if(!s)s=ts;
      const p=Math.min((ts-s)/2200,1);
      const e=1-Math.pow(1-p,3);
      setV(Math.floor(e*n));
      if(p<1)requestAnimationFrame(step);else setV(n);
    };
    requestAnimationFrame(step);
  },[active]);
  return v;
}

function Stats(){
  const [on,setOn]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){setOn(true);obs.disconnect();}},{threshold:.3});
    if(ref.current)obs.observe(ref.current);
    return()=>obs.disconnect();
  },[]);
  const items=[{n:500,pre:'+',suf:'',l:'Clientes satisfechos'},{n:15,pre:'+',suf:'',l:'Años de trayectoria'},{n:1200,pre:'+',suf:'',l:'Pólizas activas'},{n:14,pre:'+',suf:'',l:'Aseguradoras aliadas'}];
  return(
    <section ref={ref} style={{background:'linear-gradient(135deg,#0a0e0a 0%,#0d1a0d 50%,#0a0e12 100%)',padding:'80px 0',position:'relative',overflow:'hidden'}}>
      <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse 80% 50% at 50% 50%,rgba(232,160,32,.05) 0%,transparent 70%)',pointerEvents:'none'}}/>
      <div style={{maxWidth:1280,margin:'0 auto',padding:'0 24px'}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:0}}>
          {items.map((it,i)=>{
            const v=useCount(it.n,on);
            return(
              <div key={it.l} className="count-line" style={{padding:'32px 20px',textAlign:'center',borderRight:i<3?'1px solid rgba(255,255,255,.05)':'none'}}>
                <div className="gt" style={{fontFamily:"'Playfair Display',serif",fontSize:'clamp(2.5rem,4vw,3.8rem)',fontWeight:800,lineHeight:1}}>
                  {it.pre}{v.toLocaleString('es-CO')}{it.suf}
                </div>
                <div style={{color:'rgba(238,242,255,.4)',fontSize:12,fontFamily:"'DM Sans',sans-serif",marginTop:10,letterSpacing:'.1em',textTransform:'uppercase'}}>{it.l}</div>
              </div>
            );
          })}
        </div>
      </div>
    </section>
  );
}

          <div style={{marginTop:20,display:'flex',flexDirection:'column',gap:8}}>

              onMouseEnter={e=>e.currentTarget.style.color='#E8A020'} onMouseLeave={e=>e.currentTarget.style.color='rgba(238,242,255,.3)'}>

      <div style={{borderTop:'1px solid rgba(255,255,255,.05)',padding:'16px 24px',display:'flex',flexWrap:'wrap',alignItems:'center',justifyContent:'space-between',gap:12,maxWidth:1280,margin:'0 auto'}}>

        <div style={{display:'flex',gap:20}}>

/* ════════════════════ MODAL ════════════════════ */
const SP=['Vida','Salud','Hogar','Auto','Viaje','Mascotas','Educativo','Discapacidad','Arrendamiento','Exequias','Otros'];
const SE=['Vida Grupo','Salud Colectiva','CENAL','Riesgos Laborales','Propiedad','Ciberseguridad','Transportes','Cumplimiento','D&O','ARL','Agropecuario','Otros'];
const CDS=['Bogotá','Medellín','Cali','Barranquilla','Cartagena','Bucaramanga','Pereira','Manizales','Ibagué','Cúcuta','Santa Marta','Pasto','Otra'];

function Modal({open,onClose,init}){
  const [step,setStep]=useState(1);
  const [tipo,setTipo]=useState('');
  const [seg,setSeg]=useState('');
  const [form,setForm]=useState({nombre:'',apellidos:'',cedula:'',telefono:'',email:'',ciudad:'',necesidad:''});
  const [errs,setErrs]=useState({});
  const [st,setSt]=useState('idle');

  useEffect(()=>{
    if(open){
      document.body.style.overflow='hidden';
      if(init?.tipo){setTipo(init.tipo);setStep(init.seguro?3:2);setSeg(init.seguro||'');}
      else{setStep(1);setTipo('');setSeg('');}
      setSt('idle');setErrs({});
    }else document.body.style.overflow='';
    return()=>{document.body.style.overflow='';};
  },[open]);

  if(!open)return null;
  const segs=tipo==='empresa'?SE:SP;
  const val=()=>{
    const e={};
    if(!form.nombre.trim())e.nombre='Requerido';
    if(!form.apellidos.trim())e.apellidos='Requerido';
    if(!form.cedula.trim())e.cedula='Requerido';
    if(!form.telefono.trim())e.telefono='Requerido';
    if(!form.email||!/\S+@\S+\.\S+/.test(form.email))e.email='Email inválido';
    if(!form.ciudad)e.ciudad='Requerido';
    return e;
  };
  const sub=async e=>{
    e.preventDefault();
    const ev=val();
    if(Object.keys(ev).length){setErrs(ev);return;}
    setSt('sending');
    try{await emailjs.send(EMAILJS_SERVICE_ID,EMAILJS_TEMPLATE_ID,{tipo_cliente:tipo==='empresa'?'Empresa':'Persona',tipo_seguro:seg,nombre:form.nombre+' '+form.apellidos,cedula_nit:form.cedula,telefono:form.telefono,email:form.email,ciudad:form.ciudad,necesidad:form.necesidad||'No especificada',to_email:'stepsseguros@gmail.com'},EMAILJS_PUBLIC_KEY);}catch(x){console.warn(x);}
    window.open('https://www.agentemotor.com/','_blank','noopener');
    setSt('sent');
  };
  const inp2={background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',color:'#EEF2FF',padding:'11px 14px',fontFamily:"'DM Sans',sans-serif",fontSize:13,width:'100%',outline:'none',transition:'border-color .2s,box-shadow .2s'};
  const fi=e=>{e.target.style.borderColor='rgba(232,160,32,.5)';e.target.style.boxShadow='0 0 0 3px rgba(232,160,32,.08)';};
  const fb=e=>{e.target.style.borderColor='rgba(255,255,255,.1)';e.target.style.boxShadow='none';};

  return(
    <div className="modal-bkg" style={{position:'fixed',inset:0,zIndex:100,display:'flex',alignItems:'center',justifyContent:'center',padding:16,background:'rgba(4,7,16,.85)'}}>
      <div style={{background:'#0B1120',width:'100%',maxWidth:480,maxHeight:'92vh',overflowY:'auto',position:'relative',border:'1px solid rgba(255,255,255,.1)',boxShadow:'0 40px 100px rgba(0,0,0,.7)'}}>
        {/* Header */}
        <div style={{padding:'20px 24px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:'1px solid rgba(255,255,255,.08)',position:'sticky',top:0,background:'#0B1120',zIndex:10}}>
          <div>
            <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:'#EEF2FF',fontWeight:700}}>Cotización en línea</h2>
            <p style={{color:'rgba(238,242,255,.35)',fontSize:11,fontFamily:"'DM Sans',sans-serif",marginTop:2}}>Paso {step} de 3</p>
          </div>
          <button onClick={onClose} style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',color:'rgba(238,242,255,.6)',width:34,height:34,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',transition:'all .2s'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor='rgba(232,160,32,.4)';e.currentTarget.style.color='#E8A020';}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor='rgba(255,255,255,.1)';e.currentTarget.style.color='rgba(238,242,255,.6)';}}>
            <I.x/>
          </button>
        </div>
        {/* Progress */}
        <div style={{height:2,background:'rgba(255,255,255,.06)'}}>
          <div style={{height:'100%',background:'linear-gradient(90deg,#E8A020,#F5D76E)',transition:'width .5s',width:step===1?'33%':step===2?'66%':'100%'}}/>
        </div>
        {/* Body */}
        <div style={{padding:24}}>
          {st==='sent'?(
            <div style={{textAlign:'center',padding:'32px 0'}}>
              <div style={{width:56,height:56,border:'2px solid #1A7F5A',display:'flex',alignItems:'center',justifyContent:'center',color:'#1A7F5A',margin:'0 auto 16px'}}><I.check/></div>
              <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:'1.4rem',color:'#EEF2FF',marginBottom:10}}>¡Solicitud recibida!</h3>
              <p style={{color:'rgba(238,242,255,.45)',fontSize:14,fontFamily:"'DM Sans',sans-serif",lineHeight:1.6,maxWidth:280,margin:'0 auto'}}>Un asesor se comunicará contigo con tu cotización personalizada.</p>
              <button onClick={onClose} className="btn-gold" style={{marginTop:20,justifyContent:'center'}}>Cerrar</button>
            </div>
          ):step===1?(
            <div>
              <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:'#EEF2FF',marginBottom:20}}>¿Para quién es el seguro?</h3>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                {[{v:'persona',l:'Persona / Familia',e:'👨‍👩‍👧‍👦',d:'Cobertura personal y familiar'},{v:'empresa',l:'Empresa / Cooperativa',e:'🏢',d:'Soluciones corporativas'}].map(o=>(
                  <button key={o.v} onClick={()=>{setTipo(o.v);setSeg('');setStep(2);}}
                    style={{border:`1px solid ${tipo===o.v?'rgba(232,160,32,.5)':'rgba(255,255,255,.1)'}`,background:tipo===o.v?'rgba(232,160,32,.08)':'rgba(255,255,255,.03)',padding:20,textAlign:'left',cursor:'pointer',transition:'all .25s'}}
                    onMouseEnter={e=>e.currentTarget.style.borderColor='rgba(232,160,32,.4)'}
                    onMouseLeave={e=>e.currentTarget.style.borderColor=tipo===o.v?'rgba(232,160,32,.5)':'rgba(255,255,255,.1)'}>
                    <div style={{fontSize:'2rem',marginBottom:10}}>{o.e}</div>
                    <div style={{color:'#EEF2FF',fontSize:13,fontWeight:700,fontFamily:"'DM Sans',sans-serif"}}>{o.l}</div>
                    <div style={{color:'rgba(238,242,255,.4)',fontSize:11,fontFamily:"'DM Sans',sans-serif",marginTop:4}}>{o.d}</div>
                  </button>
                ))}
              </div>
            </div>
          ):step===2?(
            <div>
              <button onClick={()=>setStep(1)} style={{display:'flex',alignItems:'center',gap:4,color:'rgba(238,242,255,.45)',fontSize:12,fontFamily:"'DM Sans',sans-serif",background:'none',border:'none',cursor:'pointer',marginBottom:16,padding:0,transition:'color .2s'}}
                onMouseEnter={e=>e.currentTarget.style.color='#E8A020'} onMouseLeave={e=>e.currentTarget.style.color='rgba(238,242,255,.45)'}>
                <I.chevL/>Volver
              </button>
              <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:'#EEF2FF',marginBottom:16}}>¿Qué seguro necesitas?</h3>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
                {segs.map(s=>(
                  <button key={s} onClick={()=>{setSeg(s);setStep(3);}}
                    style={{border:`1px solid ${seg===s?'rgba(232,160,32,.5)':'rgba(255,255,255,.1)'}`,background:seg===s?'rgba(232,160,32,.1)':'rgba(255,255,255,.03)',padding:'10px 8px',fontSize:11,fontWeight:700,fontFamily:"'DM Sans',sans-serif",color:seg===s?'#E8A020':'rgba(238,242,255,.65)',cursor:'pointer',transition:'all .2s',letterSpacing:'.03em'}}>
                    {s}
                  </button>
                ))}
              </div>
            </div>
          ):(
            <form onSubmit={sub}>
              <button type="button" onClick={()=>setStep(2)} style={{display:'flex',alignItems:'center',gap:4,color:'rgba(238,242,255,.45)',fontSize:12,fontFamily:"'DM Sans',sans-serif",background:'none',border:'none',cursor:'pointer',marginBottom:16,padding:0,transition:'color .2s'}}
                onMouseEnter={e=>e.currentTarget.style.color='#E8A020'} onMouseLeave={e=>e.currentTarget.style.color='rgba(238,242,255,.45)'}>
                <I.chevL/>Volver
              </button>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:18}}>
                <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:16,color:'#EEF2FF'}}>Datos de contacto</h3>
                <span style={{background:'rgba(232,160,32,.12)',border:'1px solid rgba(232,160,32,.25)',color:'#E8A020',fontSize:10,fontWeight:700,fontFamily:"'DM Sans',sans-serif",padding:'3px 10px',letterSpacing:'.06em'}}>{seg}</span>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                  <div>
                    <input required value={form.nombre} onChange={e=>setForm({...form,nombre:e.target.value})} placeholder="Nombre *" style={{...inp2,borderColor:errs.nombre?'#ef4444':undefined}} onFocus={fi} onBlur={fb}/>
                    {errs.nombre&&<p style={{color:'#ef4444',fontSize:10,marginTop:3,fontFamily:"'DM Sans',sans-serif"}}>{errs.nombre}</p>}
                  </div>
                  <div>
                    <input required value={form.apellidos} onChange={e=>setForm({...form,apellidos:e.target.value})} placeholder="Apellidos *" style={{...inp2,borderColor:errs.apellidos?'#ef4444':undefined}} onFocus={fi} onBlur={fb}/>
                    {errs.apellidos&&<p style={{color:'#ef4444',fontSize:10,marginTop:3,fontFamily:"'DM Sans',sans-serif"}}>{errs.apellidos}</p>}
                  </div>
                </div>
                <div>
                  <input required value={form.cedula} onChange={e=>setForm({...form,cedula:e.target.value})} placeholder={`${tipo==='empresa'?'NIT':'Cédula'} *`} style={{...inp2,borderColor:errs.cedula?'#ef4444':undefined}} onFocus={fi} onBlur={fb}/>
                  {errs.cedula&&<p style={{color:'#ef4444',fontSize:10,marginTop:3,fontFamily:"'DM Sans',sans-serif"}}>{errs.cedula}</p>}
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                  <div>
                    <input required value={form.telefono} onChange={e=>setForm({...form,telefono:e.target.value})} placeholder="Celular *" style={{...inp2,borderColor:errs.telefono?'#ef4444':undefined}} onFocus={fi} onBlur={fb}/>
                    {errs.telefono&&<p style={{color:'#ef4444',fontSize:10,marginTop:3,fontFamily:"'DM Sans',sans-serif"}}>{errs.telefono}</p>}
                  </div>
                  <div>
                    <input required type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="Email *" style={{...inp2,borderColor:errs.email?'#ef4444':undefined}} onFocus={fi} onBlur={fb}/>
                    {errs.email&&<p style={{color:'#ef4444',fontSize:10,marginTop:3,fontFamily:"'DM Sans',sans-serif"}}>{errs.email}</p>}
                  </div>
                </div>
                <div>
                  <select value={form.ciudad} onChange={e=>setForm({...form,ciudad:e.target.value})} style={{...inp2,color:form.ciudad?'#EEF2FF':'rgba(238,242,255,.35)',borderColor:errs.ciudad?'#ef4444':undefined}} onFocus={fi} onBlur={fb}>
                    <option value="">Ciudad *</option>
                    {CDS.map(c=><option key={c} value={c}>{c}</option>)}
                  </select>
                  {errs.ciudad&&<p style={{color:'#ef4444',fontSize:10,marginTop:3,fontFamily:"'DM Sans',sans-serif"}}>{errs.ciudad}</p>}
                </div>
                <textarea rows={3} value={form.necesidad} onChange={e=>setForm({...form,necesidad:e.target.value})} placeholder="Cuéntanos qué necesitas (opcional)" style={{...inp2,resize:'none'}} onFocus={fi} onBlur={fb}/>
                <div style={{background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.07)',padding:'10px 14px'}}>
                  <p style={{color:'rgba(238,242,255,.35)',fontSize:11,fontFamily:"'DM Sans',sans-serif",lineHeight:1.5}}>Un asesor de Steps Seguros te contactará con tu cotización. También abriremos el portal de nuestros aliados.</p>
                </div>
                {st==='error'&&<p style={{color:'#ef4444',fontSize:12,fontFamily:"'DM Sans',sans-serif"}}>Error al enviar. Llámanos al 301 687 6767.</p>}
                <button type="submit" disabled={st==='sending'} className="btn-gold" style={{justifyContent:'center',opacity:st==='sending'?.6:1,marginTop:4}}>
                  {st==='sending'?'Enviando...':(<>Solicitar cotización <I.arrup/></>)}
                </button>
              </div>
            </form>
          )}
        </div>
      </div>
    </div>
  );
}

/* ════════════════════ APP ════════════════════ */
function App(){
  const [mOpen,setMOpen]=useState(false);
  const [mInit,setMInit]=useState(null);
  const oc=useCallback((init=null)=>{setMInit(init);setMOpen(true);},[]);
  const cl=useCallback(()=>{setMOpen(false);setMInit(null);},[]);
  return(
    <>
      <Ambient/>
      <Header onCotiza={()=>oc()}/>
      <main>
        <Hero onCotiza={()=>oc()}/>
        <About/>
        <Products onCotiza={oc}/>
        <Stats/>
        <Aliados/>
        <Testi/>
        <Contact/>
      </main>
      <Footer onCotiza={()=>oc()}/>
      <Modal open={mOpen} onClose={cl} init={mInit}/>
      {/* WhatsApp FAB */}
      <a href="https://wa.me/573016876767" target="_blank" rel="noopener noreferrer"
        style={{position:'fixed',bottom:28,right:28,zIndex:40,width:54,height:54,borderRadius:'50%',background:'#25D366',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',boxShadow:'0 4px 24px rgba(37,211,102,.45)',animation:'fl 3.5s ease-in-out infinite',textDecoration:'none',transition:'transform .2s,box-shadow .2s'}}
        onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.12)';e.currentTarget.style.boxShadow='0 8px 40px rgba(37,211,102,.6)';}}
        onMouseLeave={e=>{e.currentTarget.style.transform='scale(1)';e.currentTarget.style.boxShadow='0 4px 24px rgba(37,211,102,.45)';}}>
        <I.wa/>
      </a>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
